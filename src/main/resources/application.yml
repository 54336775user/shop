spring:
  rabbitmq:
    host: #你的rabbitmq地址
    port: #你的rabbitmq端口
    username: #你的rabbitmq用户名
    password: #你的rabbitmq密码
    listener:
      simple:
        acknowledge-mode: auto
        default-requeue-rejected: false   # 关键：最终失败不要回主队列
        retry:
          enabled: true
          initial-interval: 2000          # 第一次重试等 2 秒
          multiplier: 2.0               # 指数退避：2s, 4s
          max-interval: 10000
          max-retries: 3
  application:
    name: shop

  datasource:
    url: #你的mysql地址
    username: #你的mysql用户名
    password: #你的mysql密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000
      connection-timeout: 30000

  data:
    redis:
      host: #你的redis地址
      port: #你的redis端口
      database: #你的redis数据库
      timeout: 3000ms

shop:
  cache:
    product-list-ttl: 300
  demo:
    seed-enabled: true

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.eample.shop.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080
  servlet:
    context-path: /

logging:
  level:
    com.eample.shop: debug
jwt:
  secret: #你的jwt密钥
  expiration: 86400000   # 24 小时，毫秒
